name: fetch
on:
  push:
    paths:
      - 'manifest.json'
permissions:
  contents: write
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          mkdir -p assets
          python3 - << 'PY'
          import json,urllib.request,os
          m=json.load(open('manifest.json'))
          for it in m['items']:
              p='assets/'+it['name']
              if os.path.exists(p) and os.path.getsize(p)>1000: continue
              try:
                  urllib.request.urlretrieve(it['url'],p)
                  print('got',p,os.path.getsize(p))
              except Exception as e:
                  print('FAIL',p,e)
          PY
      - run: |
          git config user.name bridge
          git config user.email bridge@local
          git add -A assets
          git commit -m "assets batch" || echo "nothing new"
          git pull --rebase origin main || true
          git push
